name: "Terraform CI/CD + Checkov"

on:
  push:
    branches: [main]
    paths:
      - "cau1/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "cau1/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action (plan / apply / destroy)"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

env:
  TF_WORKING_DIR: cau1/terraform
  TF_VERSION: "1.7.0"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Checkov - quét bảo mật IaC
  # ─────────────────────────────────────────
  checkov:
    name: "Checkov Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov scan
        id: checkov
        run: |
          checkov \
            --directory ${{ env.TF_WORKING_DIR }} \
            --framework terraform \
            --output cli \
            --output junitxml \
            --output-file-path console,checkov-report.xml \
            --soft-fail
        continue-on-error: true   # không block pipeline, chỉ report

      - name: Upload Checkov report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: checkov-report.xml

  # ─────────────────────────────────────────
  # JOB 2: Terraform Validate + Plan
  # ─────────────────────────────────────────
  terraform-plan:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest
    needs: checkov
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN:     ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Write tfvars from secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region          = "${{ secrets.AWS_REGION }}"
          availability_zone   = "${{ secrets.AWS_AZ }}"
          ami_id              = "${{ secrets.AWS_AMI_ID }}"
          key_pair_name       = "${{ secrets.AWS_KEY_PAIR_NAME }}"
          allowed_ssh_cidr    = "${{ secrets.ALLOWED_SSH_CIDR }}"
          vpc_cidr            = "${{ vars.VPC_CIDR }}"
          public_subnet_cidr  = "${{ vars.PUBLIC_SUBNET_CIDR }}"
          private_subnet_cidr = "${{ vars.PRIVATE_SUBNET_CIDR }}"
          instance_type       = "${{ vars.INSTANCE_TYPE }}"
          project_name        = "${{ vars.PROJECT_NAME }}"
          environment         = "${{ vars.ENVIRONMENT }}"
          EOF

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: Terraform Apply (chỉ chạy trên main hoặc workflow_dispatch apply)
  # ─────────────────────────────────────────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production   # yêu cầu manual approval trên GitHub
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Write tfvars from secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region          = "${{ secrets.AWS_REGION }}"
          availability_zone   = "${{ secrets.AWS_AZ }}"
          ami_id              = "${{ secrets.AWS_AMI_ID }}"
          key_pair_name       = "${{ secrets.AWS_KEY_PAIR_NAME }}"
          allowed_ssh_cidr    = "${{ secrets.ALLOWED_SSH_CIDR }}"
          vpc_cidr            = "${{ vars.VPC_CIDR }}"
          public_subnet_cidr  = "${{ vars.PUBLIC_SUBNET_CIDR }}"
          private_subnet_cidr = "${{ vars.PRIVATE_SUBNET_CIDR }}"
          instance_type       = "${{ vars.INSTANCE_TYPE }}"
          project_name        = "${{ vars.PROJECT_NAME }}"
          environment         = "${{ vars.ENVIRONMENT }}"
          EOF

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false

      - name: Show Outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output

  # ─────────────────────────────────────────
  # JOB 4: Terraform Destroy (chỉ chạy khi trigger thủ công)
  # ─────────────────────────────────────────
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Write tfvars from secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          aws_region          = "${{ secrets.AWS_REGION }}"
          availability_zone   = "${{ secrets.AWS_AZ }}"
          ami_id              = "${{ secrets.AWS_AMI_ID }}"
          key_pair_name       = "${{ secrets.AWS_KEY_PAIR_NAME }}"
          allowed_ssh_cidr    = "${{ secrets.ALLOWED_SSH_CIDR }}"
          vpc_cidr            = "${{ vars.VPC_CIDR }}"
          public_subnet_cidr  = "${{ vars.PUBLIC_SUBNET_CIDR }}"
          private_subnet_cidr = "${{ vars.PRIVATE_SUBNET_CIDR }}"
          instance_type       = "${{ vars.INSTANCE_TYPE }}"
          project_name        = "${{ vars.PROJECT_NAME }}"
          environment         = "${{ vars.ENVIRONMENT }}"
          EOF

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve -input=false
