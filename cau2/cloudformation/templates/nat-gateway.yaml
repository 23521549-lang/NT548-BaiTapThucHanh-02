AWSTemplateFormatVersion: "2010-09-09"
Description: "NT548 Cau2 - Stack 2: NAT Gateway"

Parameters:
  ProjectName:
    Type: String
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev

Resources:
  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !ImportValue
        Fn::Sub: "${ProjectName}-${Environment}-PublicSubnetId"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-nat-gw"

Outputs:
  NatGatewayId:
    Value: !Ref NatGateway
    Export:
      Name: !Sub "${ProjectName}-${Environment}-NatGatewayId"
  NatEipPublicIp:
    Value: !Ref NatEIP
    Export:
      Name: !Sub "${ProjectName}-${Environment}-NatEipPublicIp"
